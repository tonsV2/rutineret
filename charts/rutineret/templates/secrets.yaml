apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rutineret.fullname" . }}
  labels:
    {{- include "rutineret.labels" . | nindent 4 }}
type: Opaque
data:
  GOOGLE_OAUTH2_CLIENT_ID: {{ .Values.googleOAuth.clientId | b64enc | quote }}
  GOOGLE_OAUTH2_CLIENT_SECRET: {{ .Values.googleOAuth.clientSecret | b64enc | quote }}
{{- if not .Values.valkeyConnection.existingSecret }}
  REDIS_PASSWORD: {{ .Values.valkeyConnection.password | b64enc | quote }}
{{- end }}
