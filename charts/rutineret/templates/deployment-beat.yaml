apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rutineret.fullname" . }}-beat
  labels:
    {{- include "rutineret.labels" . | nindent 4 }}
    component: beat
spec:
  replicas: {{ .Values.beat.replicaCount }}
  selector:
    matchLabels:
      {{- include "rutineret.selectorLabels" . | nindent 6 }}
      component: beat
  template:
    metadata:
      annotations:
        {{- if .Values.beat.podAnnotations }}
        {{- toYaml .Values.beat.podAnnotations | nindent 8 }}
        {{- end }}
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
        apparmor.security.beta.kubernetes.io/container: runtime-default
      labels:
        {{- include "rutineret.labels" . | nindent 8 }}
        component: beat
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rutineret.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-beat
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.beat.command | nindent 12 }}
          {{- with .Values.beat.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: api.settings.production
            - name: POSTGRES_USER
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.username }}
              {{- else if .Values.postgresql.managed.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: username
              {{- else }}
              value: postgres
              {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.existingSecret }}
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
                  {{- else if .Values.postgresql.managed.enabled }}
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: password
                  {{- else }}
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_PASSWORD
                  {{- end }}
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.valkeyConnection.existingSecret }}
                  name: {{ .Values.valkeyConnection.existingSecret }}
                  key: {{ .Values.valkeyConnection.secretKeys.password }}
                  {{- else }}
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_PASSWORD
                  {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "rutineret.fullname" . }}
          volumeMounts:
            - name: tmpfs
              mountPath: /tmp
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
