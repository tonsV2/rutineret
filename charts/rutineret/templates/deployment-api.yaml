apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rutineret.fullname" . }}-api
  labels:
    {{- include "rutineret.labels" . | nindent 4 }}
    component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rutineret.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "rutineret.labels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rutineret.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: api.settings.production
            - name: POSTGRES_USER
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.username }}
              {{- else if .Values.postgresql.managed.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: username
              {{- else }}
              value: postgres
              {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.existingSecret }}
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
                  {{- else if .Values.postgresql.managed.enabled }}
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: password
                  {{- else }}
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_PASSWORD
                  {{- end }}
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_DB
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_PORT
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
        - name: {{ .Chart.Name }}-api
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.api.command | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_SETTINGS_MODULE
              value: api.settings.production
            - name: POSTGRES_USER
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.username }}
              {{- else if .Values.postgresql.managed.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: username
              {{- else }}
              value: postgres
              {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.existingSecret }}
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
                  {{- else if .Values.postgresql.managed.enabled }}
                  name: {{ include "rutineret.fullname" . }}-postgres-app
                  key: password
                  {{- else }}
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_PASSWORD
                  {{- end }}
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: POSTGRES_DB
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.valkeyConnection.existingSecret }}
                  name: {{ .Values.valkeyConnection.existingSecret }}
                  key: {{ .Values.valkeyConnection.secretKeys.password }}
                  {{- else }}
                  name: {{ include "rutineret.fullname" . }}
                  key: REDIS_PASSWORD
                  {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "rutineret.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
