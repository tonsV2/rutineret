apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: rutineret
build:
  artifacts:
    - image: tons/rutineret
deploy:
  statusCheckDeadlineSeconds: 300
  tolerateFailuresUntilDeadline: true
  helm:
    releases:
      - name: rutineret
        chartPath: charts/rutineret
        namespace: rutineret
        createNamespace: true
        setValueTemplates:
          googleOAuth:
            clientId: "{{.GOOGLE_OAUTH2_CLIENT_ID}}"
            clientSecret: "{{.GOOGLE_OAUTH2_CLIENT_SECRET}}"
          frontendUrl: https://rutineret.c.th.fitfit.dk
          apiUrl: https://api.rutineret.c.th.fitfit.dk
          ingress:
            enabled: true
            hosts:
              - host: api.rutineret.c.th.fitfit.dk
                paths:
                  - path: /
                    pathType: ImplementationSpecific
